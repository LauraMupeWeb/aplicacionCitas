<!doctype html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>App de Citas</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="contenedor">

        <h1>App de citas</h1>
        <button id="modoOscuro">🌙 Modo oscuro</button>
        


        <form class="formulario">
            <input type="text" id="paciente" placeholder="Nombre del paciente">
            <input type="date" id="fecha">
            <input type="time" id="hora">

            <button type="button" id="btnAgregar">Añadir citas</button>

        </form>
        <input type="text" id="buscador" placeholder="Buscar paciente...">
        <ul id="listaCitas"></ul>
        <button id="borrarTodo">Borrar todas las citas</button>

    </div>

    <script src="script.js"></script>

</body>




</html>
